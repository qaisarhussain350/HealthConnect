<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthConnect - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>HealthConnect</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <h2>Create Your Account</h2>
      <p>Sign up to track your health progress, receive personalized tips, and get access to verified medical content.</p>
      <form action="#" method="post">
        <label for="reg-username">Username:</label>
        <input type="text" id="reg-username" name="reg-username" required>
        <br>
        <label for="reg-email">Email:</label>
        <input type="email" id="reg-email" name="reg-email" required>
        <br>
        <label for="reg-password">Password:</label>
        <input type="password" id="reg-password" name="reg-password" required>
        <br>
        <label for="reg-confirm-password">Confirm Password:</label>
        <input type="password" id="reg-confirm-password" name="reg-confirm-password" required>
        <br>
        <input type="submit" value="Register">
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 HealthConnect. All Rights Reserved.</p>
  </footer>
</body>
</html>
